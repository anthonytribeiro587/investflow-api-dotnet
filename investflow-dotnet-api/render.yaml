services:
  - type: web
    name: investflow-api-dotnet
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: CORS_ORIGINS
        value: https://invest-flow-azure.vercel.app
      - key: SUPABASE_DB_URL
        sync: false
